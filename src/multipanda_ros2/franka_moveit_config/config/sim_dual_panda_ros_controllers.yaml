mujoco_server:
  ros__parameters:
    MujocoPlugins:
      names:
        - mujoco_ros2_control
      mujoco_ros2_control:
        type: mujoco_ros2_control::MujocoRos2ControlPlugin

controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    dual_panda_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    force_torque_sensor_broadcaster_left:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster
    force_torque_sensor_broadcaster_right:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster

dual_panda_arm_controller:
  ros__parameters:
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    joints:
      - mj_right_joint1
      - mj_right_joint2
      - mj_right_joint3
      - mj_right_joint4
      - mj_right_joint5
      - mj_right_joint6
      - mj_right_joint7
      - mj_left_joint1
      - mj_left_joint2
      - mj_left_joint3
      - mj_left_joint4
      - mj_left_joint5
      - mj_left_joint6
      - mj_left_joint7
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0

force_torque_sensor_broadcaster_left:
  ros__parameters:
    sensor_name: mj_left_hand_ft_sensor
    frame_id: mj_left_hand

force_torque_sensor_broadcaster_right:
  ros__parameters:
    sensor_name: mj_right_hand_ft_sensor
    frame_id: mj_right_hand
